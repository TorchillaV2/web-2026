<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Войти - Социальная сеть</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <main class="login-page">
        <div class="login-visual">
            <h1 class="page-title">Войти</h1>
            <img class="login-image" src="./happy_man.png" alt="Счастливый человек с рюкзаком">
        </div>
        <div class="form-container">
            <form class="login-form">
                <div class="input-group">
                    <label class="form-label" for="email">Электропочта</label>
                    <input class="form-input" type="email" id="email" name="email" required/>
                    <span class="form-hint">Введите электропочту в формате *****@***.**</span>
                </div>
                <div class="input-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="password-wrapper">
                        <input class="form-input password-input" type="password" id="password" name="password" required/>
                        <button class="password-toggle" type="button">
                            <img class="eye-icon" src="./Eye-off.png" alt="Скрыть пароль" />
                        </button>
                    </div>
                </div>
                
                <button class="submit-button" type="submit">Продолжить</button>
            </form>
        </div>
    </main>
</body>
</html>
