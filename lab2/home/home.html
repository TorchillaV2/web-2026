<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Основная лента</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="header-items">
        <img class="item-home" src="./item-home.png" alt=" To home page">
        <img class="item-man" src="./item-man.png" alt=" To ptofile">
        <img class="item-plus" src="./item-plus.png" alt=" Plus">
    </div>
    <div class="news">
        <div class="news-top">
            <img class="avatar" src="./Avatar.png" alt="avatar">
            <span class="avatar-name">Ваня Денисов</span>
            <img class="edit" src="./edit.png" alt="edit">
        </div>
        <div class="news-photo">
            <img class="photo-indicator" src="./indicator.png" alt="indicator">
            <img class="photo" src="./photo.png" alt="photo">
            <img class="photo-slider-left" src="./left-slider.png" alt="slide">
            <img class="photo-slider-right" src="./right-slider.png" alt="slide">
        </div>
        <div class="like">
            <button class="like"> 
                <img class="reaction" src="./like.png" alt="like">
            </button>
        </div>
        <div class="news-bottom">
            <p class="bottom-description">
                Так красиво сегодня на улице! Настоящая зима)) Вспоминается 
                Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в городке, занесенном снегом по ручку двери...» 
            </p>
            <span class="bottom-more">ещё</span>
            <span class="bottom-time">2 часа назад</span>
        </div>
    </div>
    <div class="news">
        <div class="news-top">
            <img class="avatar" src="./avatar2.png" alt="avatar">
            <span class="avatar-name">Лиза Дёмина</span>
        </div>
        <div class="news-photo">
            <img class="photo" src="./photo2.jpg" alt="photo">
        </div>
    </div>
</body>
</html>
